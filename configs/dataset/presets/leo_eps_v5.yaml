# LEO EPS mission variant V5 — PAYLOAD-HEAVY MISSION
#
# High-duty-cycle payload (imaging or SAR mission). Payload is on ~40%
# of the time in long bursts, driving bus current up and battery SoC
# down more aggressively than the base mission profile.
#
# Delta from base:
#   - seed=1005
#   - payload_active_rate_per_hour ×3 (0.8 → 2.4)
#   - payload_duration_s ×2 (600 → 1200) — longer payload bursts
#   - payload_power baseline higher (5 → 12 W)
#   - LinearCoupling gain bumped (payload → bus current tightly coupled)
#   - OscillationFault more common (heavy load = more instability)

_target_key: layered_synth
n_samples: 86400
sample_rate_hz: 1.0
seed: 1005
name: leo_eps_v5
subsystem: eps

channels:
  - {name: bus_voltage,   units: V,    subsystem: eps,     sample_rate_hz: 1.0}
  - {name: bus_current,   units: A,    subsystem: eps,     sample_rate_hz: 1.0}
  - {name: battery_soc,   units: pct,  subsystem: eps,     sample_rate_hz: 1.0}
  - {name: panel_temp_x,  units: degC, subsystem: tcs,     sample_rate_hz: 1.0}
  - {name: panel_temp_y,  units: degC, subsystem: tcs,     sample_rate_hz: 1.0}
  - {name: payload_power, units: W,    subsystem: payload, sample_rate_hz: 1.0}

components:
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.modes.ModeMachine, period_s: 5400.0, eclipse_fraction: 0.35, payload_active_rate_per_hour: 2.4, payload_duration_s: 1200.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.OrbitalSinusoid, channel: bus_voltage, amplitude: 0.3, period_s: 5400.0, baseline: 28.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.BatterySoC, channel: battery_soc, capacity_Ah: 30.0, charge_rate_A: 2.5, discharge_rate_A: 6.0, initial_soc: 0.75}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.ThermalDutyCycle, channel: panel_temp_x, equilibrium_sun_C: 55.0, equilibrium_shade_C: -40.0, time_constant_s: 600.0, initial_C: 20.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.ThermalDutyCycle, channel: panel_temp_y, equilibrium_sun_C: 50.0, equilibrium_shade_C: -42.0, time_constant_s: 650.0, initial_C: 18.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.OrbitalSinusoid, channel: payload_power, amplitude: 0.0, period_s: 5400.0, baseline: 12.0}

  # Tighter coupling — payload heavily influences bus
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.coupling.LinearCoupling, source: payload_power, target: bus_current, gain: 0.08, offset: 1.2}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.coupling.InverseCoupling, source: bus_current, target: bus_voltage, gain: 0.10}

  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.GaussianNoise, channel: bus_voltage, std: 0.025}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.StudentTNoise, channel: bus_current, scale: 0.03, df: 4.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.PoissonBurstNoise, channel: bus_current, event_rate_per_hour: 1.0, burst_size: 10, magnitude: 0.15}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.PinkNoise, channel: panel_temp_x, std: 0.3}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.PinkNoise, channel: panel_temp_y, std: 0.3}

  # Faults — oscillation heavy because of high current draw
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.OscillationFault, channel: bus_current, rate_per_day: 2.4, frequency_hz: 0.3, amplitude: 0.6, duration_s: 120.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.OscillationFault, channel: bus_voltage, rate_per_day: 1.5, frequency_hz: 0.15, amplitude: 0.3, duration_s: 90.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.PointFault, channel: bus_current, rate_per_hour: 1.2, magnitude: 0.8}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.DropoutFault, channel: payload_power, rate_per_hour: 0.5, min_duration_s: 2.0, max_duration_s: 10.0}
