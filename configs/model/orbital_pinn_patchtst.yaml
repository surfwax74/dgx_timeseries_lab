# PINN: orbital-physics residual + PatchTST+MAE inner.
# The orbital physics model subtracts sun-angle/eclipse-driven predictions
# from solar array channels before PatchTST sees them — leaving only the
# "anomalous" residual to detect.
_target_key: pinn_residual

inner:
  _target_key: patchtst_mae
  window_length: 256
  patch_len: 16
  d_model: 64
  n_layers: 2
  n_heads: 2

physics:
  _target_key: orbital
  period_s: 5400.0
  eclipse_fraction: 0.35
