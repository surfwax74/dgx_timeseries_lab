[project]
name = "dgx-ts-lab"
version = "0.1.0"
description = "Implementations: datasets, detectors, trainers, MLflow tracking, and CLI for satellite telemetry anomaly detection"
requires-python = ">=3.12"
dependencies = [
    "dgx-ts-core",
    # Torch range allows 2.5.x through 2.7.x — the CUDA index pinned in
    # the workspace-root pyproject.toml controls which variant gets pulled
    # (+cpu on Windows dev, +cu126 / +cu128 on Linux/DGX). Don't widen
    # past 2.8 without testing — 2.8 ships cu129 as default which may not
    # match older drivers.
    "torch>=2.5,<2.8",
    "lightning>=2.4,<2.6",
    "hydra-core>=1.3",
    "omegaconf>=2.3",
    "mlflow>=2.18",
    "numpy>=1.26",
    "scikit-learn>=1.5",
    "pyarrow>=18",
    # Foundation-model support (Phase 3)
    "transformers>=4.45",
    "huggingface_hub>=0.25",
    "peft>=0.13",
    # MLOps lift (Phase 5)
    "onnx>=1.17",
    "onnxruntime>=1.20",
    # Explanation layer (Phase 7)
    "captum>=0.8",
    "matplotlib>=3.9",
]

[project.scripts]
dgx-ts = "dgx_ts_lab.cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dgx_ts_lab"]
