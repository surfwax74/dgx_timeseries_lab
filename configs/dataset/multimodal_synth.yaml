# Phase 10 multi-modal synthetic dataset: aligned telemetry + commands + logs
# generated by `dgx_ts_lab.datasets.multimodal.synth_multimodal_leo`.
# Sparse-event modalities (commands / logs) are bucketed onto the same 1 Hz
# grid as telemetry and concatenated channel-wise.
_target_key: synth_multimodal_leo

n_seconds: 3600
seed: 0
n_telemetry_channels: 6
command_rate_per_hour: 30.0
log_heartbeat_period_s: 60.0
fault_correlated_priv_rate: 0.05
