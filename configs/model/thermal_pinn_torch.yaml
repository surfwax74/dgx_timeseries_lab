# Phase 9 hand-rolled thermal PINN (no Modulus). Used as a PhysicsModel
# inside PINNResidualDetector to subtract physics-explainable temperatures
# before the neural detector sees the residual.
_target_key: pinn_residual

inner:
  _target_key: patchtst_mae
  window_length: 256
  patch_len: 16
  d_model: 64
  n_layers: 2
  n_heads: 2

physics:
  _target_key: thermal           # uses naive Euler ThermalResidual today
  period_s: 5400.0
  eclipse_fraction: 0.35

# NOTE: the trainable hand-rolled PINN (Phase 9) requires a pretraining step
# against the higher-fidelity solver — see scripts/train_thermal_pinn.sh.
# After pretraining, swap physics._target_key to "thermal_pinn" (which is
# registered via thermal_pinn.ThermalPinnPhysicsModel).
