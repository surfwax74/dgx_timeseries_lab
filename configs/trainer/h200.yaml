# Single H200 (141 GB HBM3e). DGX tier, one GPU.
# Realistic model ceiling: ~7B params dense bf16, ~14B with optimizer offload.
# Recommended for Sat-TSFM medium-large (500M) without sharding.
_target_key: lightning

max_epochs: 100
batch_size: 256
window_length: 2048
window_stride: 1024
learning_rate: 0.0001
seed: 0
device: cuda
precision: bf16-mixed
strategy: auto
num_workers: 16
checkpoint_dir: checkpoints
extra:
  grad_clip_norm: 1.0
  log_every_n_steps: 100
