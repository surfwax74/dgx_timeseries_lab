[project]
name = "dgx-ts-core"
version = "0.1.0"
description = "Pure interfaces for time-series anomaly detection — no torch dependency, designed to be importable by downstream MLOps systems"
requires-python = ">=3.12"
dependencies = [
    "typing-extensions>=4.12",
    "numpy>=1.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dgx_ts_core"]
