# Eight H200s (141 GB each = ~1.1 TB HBM3e pooled). The DGX flex tier.
# Realistic model ceiling: 70B+ params with FSDP + activation checkpointing.
# Recommended for Sat-TSFM xlarge (1B+), full-fine-tune of MOMENT-large.
_target_key: lightning

max_epochs: 200
batch_size: 32              # per-device; effective = 32 * 8 = 256
window_length: 4096
window_stride: 2048
learning_rate: 0.00008
seed: 0
device: cuda
precision: bf16-mixed
strategy: fsdp
num_workers: 16
checkpoint_dir: checkpoints
extra:
  grad_clip_norm: 1.0
  log_every_n_steps: 200
  # FSDP-specific knobs read by training/strategies/fsdp.py (Phase 4):
  fsdp_auto_wrap_min_params: 100000000   # wrap modules >= 100M params
  fsdp_activation_checkpointing: true
