# Cached alias — reads the pre-materialized LEO EPS 24h preset from
# data/synth/leo_eps_24h/ instead of regenerating in-memory.
#
# First-time setup (creates the cache):
#     dgx-ts synth dataset=presets/leo_eps_24h
# or:
#     pwsh scripts/build_dataset.ps1 leo_eps_24h        # Windows
#     bash scripts/build_dataset.sh leo_eps_24h         # Linux/DGX
#
# Subsequent runs just load the parquet — no regeneration:
#     dgx-ts train dataset=cached/leo_eps_24h model=patchtst_mae
#
# If the cache doesn't exist, ParquetTelemetryDataset raises a clear
# FileNotFoundError pointing at data/synth/leo_eps_24h/data.parquet.
_target_key: parquet_telemetry
data_path: data/synth/leo_eps_24h
