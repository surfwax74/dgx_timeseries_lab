# LEO EPS mission variant V2 — STORMY MISSION
#
# Same structure as leo_eps_24h but with HIGH noise across all bands
# and HIGH fault rates. Represents a spacecraft in a harsh radiation
# environment or with degraded components — the AD model's "high signal
# to noise" regime.
#
# Delta from base:
#   - seed=1002
#   - Gaussian + Pink + StudentT + PoissonBurst all × 2
#   - fault rates ×2 (except CorrelationBreak which stays similar)

_target_key: layered_synth
n_samples: 86400
sample_rate_hz: 1.0
seed: 1002
name: leo_eps_v2
subsystem: eps

channels:
  - {name: bus_voltage,   units: V,    subsystem: eps,     sample_rate_hz: 1.0}
  - {name: bus_current,   units: A,    subsystem: eps,     sample_rate_hz: 1.0}
  - {name: battery_soc,   units: pct,  subsystem: eps,     sample_rate_hz: 1.0}
  - {name: panel_temp_x,  units: degC, subsystem: tcs,     sample_rate_hz: 1.0}
  - {name: panel_temp_y,  units: degC, subsystem: tcs,     sample_rate_hz: 1.0}
  - {name: payload_power, units: W,    subsystem: payload, sample_rate_hz: 1.0}

components:
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.modes.ModeMachine, period_s: 5400.0, eclipse_fraction: 0.35, payload_active_rate_per_hour: 1.2, payload_duration_s: 400.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.OrbitalSinusoid, channel: bus_voltage, amplitude: 0.3, period_s: 5400.0, baseline: 28.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.BatterySoC, channel: battery_soc, capacity_Ah: 30.0, charge_rate_A: 2.5, discharge_rate_A: 4.0, initial_soc: 0.65}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.ThermalDutyCycle, channel: panel_temp_x, equilibrium_sun_C: 55.0, equilibrium_shade_C: -40.0, time_constant_s: 600.0, initial_C: 20.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.ThermalDutyCycle, channel: panel_temp_y, equilibrium_sun_C: 50.0, equilibrium_shade_C: -42.0, time_constant_s: 650.0, initial_C: 18.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.physics.OrbitalSinusoid, channel: payload_power, amplitude: 0.0, period_s: 5400.0, baseline: 5.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.coupling.LinearCoupling, source: payload_power, target: bus_current, gain: 0.04, offset: 1.2}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.coupling.InverseCoupling, source: bus_current, target: bus_voltage, gain: 0.05}

  # High noise across all bands (×2)
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.GaussianNoise, channel: bus_voltage, std: 0.04}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.PinkNoise, channel: bus_voltage, std: 0.02}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.StudentTNoise, channel: bus_current, scale: 0.04, df: 3.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.PinkNoise, channel: panel_temp_x, std: 0.6}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.PinkNoise, channel: panel_temp_y, std: 0.6}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.PoissonBurstNoise, channel: bus_current, event_rate_per_hour: 1.5, burst_size: 12, magnitude: 0.2}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.noise.QuantizationNoise, channel: bus_voltage, n_bits: 10, full_scale: 32.0}

  # High fault rates (×2)
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.PointFault, channel: bus_voltage, rate_per_hour: 2.0, magnitude: 0.8}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.DropoutFault, channel: bus_current, rate_per_hour: 1.0, min_duration_s: 3.0, max_duration_s: 12.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.StuckAtFault, channel: panel_temp_x, rate_per_day: 3.0, min_duration_s: 60.0, max_duration_s: 300.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.DriftFault, channel: panel_temp_y, rate_per_day: 2.0, ramp_duration_s: 600.0, final_offset: 5.0}
  - {_target_: dgx_ts_lab.datasets.synthetic.layered.faults.OscillationFault, channel: bus_current, rate_per_day: 1.6, frequency_hz: 0.3, amplitude: 0.5, duration_s: 120.0}
